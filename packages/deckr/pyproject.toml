[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "deckr"
version = "0.1.0"
description = "Deckr core contracts and messaging for controllers, drivers, and plugin hosts"
license = { text = "MIT" }
authors = [
    { name = "Kaj Siebert", email = "kaj@k-si.com" }
]
requires-python = ">=3.11,<4.0.0"
dependencies = [
    "anyio>=4.12.1,<5.0.0",
    "pydantic>=2.12.5,<3.0.0",
    "aiomqtt>=2.0.0,<3.0.0",
    "python-decouple>=3.8,<4.0",
]

[project.urls]
Repository = "https://github.com/kws/deckr"

[tool.hatch.build.targets.wheel]
packages = ["src/deckr"]
