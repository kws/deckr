[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "deckr-controller"
version = "0.1.0"
description = "Deckr controller: device management, config, plugin context, rendering"
license = { text = "MIT" }
authors = [
    { name = "Kaj Siebert", email = "kaj@k-si.com" }
]
requires-python = ">=3.11,<4.0.0"
dependencies = [
    "deckr>=0.1.0,<0.2.0",
    "pillow>=12.1.0,<13.0.0",
    "pyyaml>=6.0.3,<7.0.0",
    "httpx>=0.28.1,<0.29.0",
    "aiomqtt>=2.0.0,<3.0.0",
    "python-decouple>=3.8,<4.0",
    "cairosvg>=2.8.2,<3.0.0",
    "simpleeval>=1.0.3,<2.0.0",
    "tinydb>=4.8.2,<5.0.0",
    "platformdirs>=4.5.1,<5.0.0",
    "deckr-fonts>=0.2.0",
    "justmytype>=0.3.0,<0.4.0",
    "justmyresource[icons]>=1.1.1,<2.0.0",
    "justmyresource-lucide>=0.575.0",
    "invariant-core==0.3.0",
    "invariant-gfx==0.2.0",
    "watchfiles>=1.1.1,<2.0.0",
    "websockets>=12.0,<16.0",
]

[project.scripts]
deckr = "deckr.controller:main"
deckr-device-manager = "deckr.controller:device_manager_main"

[project.urls]
Repository = "https://github.com/kws/deckr"

[tool.uv.sources]
deckr = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/deckr"]
